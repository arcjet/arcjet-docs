name: Update Playwright snapshots

# Regenerate Playwright snapshots on a feature branch and push the result back.
#
# Trigger: manual `workflow_dispatch`. The workflow runs against the ref it was
# dispatched on, so:
#
#   gh workflow run playwright-update.yml --ref rei/feat/some-branch
#
# (or the GitHub UI equivalent) will regenerate snapshots for that branch.
#
# Why this exists: the regen procedure in CONTRIBUTING.md works on Linux x86_64
# hosts but produces ~few-thousand-pixel divergence on Apple Silicon contributors
# (Chromium font rasterization differs between native amd64 and Rosetta-emulated
# amd64, even from inside the multi-arch devcontainer). Running the regen on the
# CI runner eliminates the host-arch concern: the runner is amd64 by definition,
# so its renders match what the regular Playwright test job produces on the same
# runner architecture.
#
# Note: pushes from `GITHUB_TOKEN` do not retrigger downstream workflow runs.
# After this workflow commits new snapshots, the existing `Playwright tests`
# workflow will not re-run automatically — push another commit (or re-run the
# checks manually) to verify the regenerated snapshots pass.

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Refuse to run against main or a non-branch ref
        # `workflow_dispatch` can target tags as well as branches. Reject both
        # `main` and any non-branch ref (e.g. `refs/tags/...`) so the push step's
        # `${GITHUB_REF#refs/heads/}` strip always has something to strip.
        if: ${{ !startsWith(github.ref, 'refs/heads/') || github.ref == 'refs/heads/main' }}
        run: |
          echo "::error::This workflow must be dispatched against a feature branch (got ${GITHUB_REF})."
          exit 1

  update:
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@c6295a65d1254861815972266d5933fd6e532bdf # v2.11.1
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Default, but explicit: keep the GITHUB_TOKEN credentials available
          # so the final step can push the regenerated snapshots back to the
          # branch.
          persist-credentials: true
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          cache: npm
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npm run pw:install
      - name: Build site
        run: npm run build
        env:
          # We need an Arcjet key for the dev server to run, but it doesn't
          # actually need to be valid for the tests to run.
          ARCJET_KEY: ajkey_dummy
          # See astro.config.mts for context.
          ASTRO_FORCE_NODE_ADAPTER: "1"
      - name: Regenerate Playwright snapshots
        # Use --update-snapshots=all so we don't depend on Playwright's "changed"
        # heuristic, which only updates snapshots that produced a diff in this
        # exact run. The workflow is invoked deliberately, so a full refresh is
        # the expected outcome.
        run: npm run pw:run -- --update-snapshots=all
        env:
          ARCJET_KEY: ajkey_dummy
          ASTRO_FORCE_NODE_ADAPTER: "1"
      - name: Commit and push regenerated snapshots
        run: |
          set -euo pipefail
          git add tests/
          if git diff --cached --quiet; then
            echo "No snapshot changes — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit \
            -m "test: regenerate Playwright snapshots from CI" \
            -m "Regenerated by .github/workflows/playwright-update.yml." \
            -m "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
